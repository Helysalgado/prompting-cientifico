name: Publish Quarto Course

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render course
        run: quarto render

      - name: Upload HTML site
        uses: actions/upload-artifact@v4
        with:
          name: site-html
          path: _site
          retention-days: 1

  export-docx:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        chapter: [capitulo1, capitulo2, capitulo3, capitulo4]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install DOCX dependencies
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Export DOCX
        run: quarto render "chapters/${{ matrix.chapter }}/index.qmd" --to docx --profile export

      - name: Stage DOCX artifact
        run: |
          mkdir -p _artifact_docx
          cp "_site/chapters/${{ matrix.chapter }}/index.docx" "_artifact_docx/${{ matrix.chapter }}.docx"

      - name: Upload DOCX
        uses: actions/upload-artifact@v4
        with:
          name: export-docx-${{ matrix.chapter }}
          path: _artifact_docx/${{ matrix.chapter }}.docx
          retention-days: 1

  export-pdf:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install PDF dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin
          quarto install tinytex --no-prompt
          npm install -g @mermaid-js/mermaid-cli

      - name: Export PDFs
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          mkdir -p _export_pdf
          for ch in capitulo1 capitulo2 capitulo3 capitulo4; do
            echo "::group::PDF ${ch}"
            if timeout 900 quarto render "chapters/${ch}/index.qmd" --to pdf --profile export; then
              cp "_site/chapters/${ch}/index.pdf" "_export_pdf/${ch}.pdf"
              echo "OK: ${ch}"
            else
              echo "::warning::PDF export failed for ${ch}"
            fi
            echo "::endgroup::"
          done
          ls -la _export_pdf/ || true

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: export-pdf
          path: _export_pdf
          retention-days: 1
          if-no-files-found: warn

  deploy:
    needs: [build, export-docx, export-pdf]
    if: ${{ always() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download HTML site
        uses: actions/download-artifact@v4
        with:
          name: site-html
          path: _site

      - name: Download DOCX exports
        uses: actions/download-artifact@v4
        with:
          pattern: export-docx-*
          merge-multiple: true
          path: _exports-docx

      - name: Download PDF exports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: export-pdf
          path: _exports-pdf

      - name: Merge exports into site
        run: |
          for ch in capitulo1 capitulo2 capitulo3 capitulo4; do
            docx="_exports-docx/${ch}.docx"
            pdf="_exports-pdf/${ch}.pdf"
            if [ -f "$docx" ]; then
              cp "$docx" "_site/chapters/${ch}/index.docx"
              echo "DOCX OK: ${ch}"
            else
              echo "::warning::Missing DOCX for ${ch}"
            fi
            if [ -f "$pdf" ]; then
              cp "$pdf" "_site/chapters/${ch}/index.pdf"
              echo "PDF OK: ${ch}"
            else
              echo "::warning::Missing PDF for ${ch}"
            fi
          done
          echo "Files published:"
          ls -la _site/chapters/capitulo*/index.docx _site/chapters/capitulo*/index.pdf 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
