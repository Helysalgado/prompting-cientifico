name: Publish Quarto Course

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render course
        run: quarto render

      - name: Upload HTML site
        uses: actions/upload-artifact@v4
        with:
          name: site-html
          path: _site
          retention-days: 1

  export:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        chapter: [capitulo1, capitulo2, capitulo3, capitulo4]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install export dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin chromium-browser
          quarto install tinytex --no-prompt
          npm install -g @mermaid-js/mermaid-cli
          CHROME="$(command -v chromium-browser || command -v chromium || true)"
          echo "CHROME_PATH=${CHROME}" >> "$GITHUB_ENV"

      - name: Export DOCX
        run: |
          ch="chapters/${{ matrix.chapter }}/index.qmd"
          echo "Exporting DOCX: $ch"
          quarto render "$ch" --to docx --profile export

      - name: Export PDF
        continue-on-error: true
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ env.CHROME_PATH }}
        run: |
          ch="chapters/${{ matrix.chapter }}/index.qmd"
          echo "Exporting PDF: $ch"
          quarto render "$ch" --to pdf --profile export

      - name: Stage chapter exports
        if: always()
        run: |
          mkdir -p "_export/chapters/${{ matrix.chapter }}"
          for ext in docx pdf; do
            src="_site/chapters/${{ matrix.chapter }}/index.${ext}"
            if [ -f "$src" ]; then
              cp "$src" "_export/chapters/${{ matrix.chapter }}/"
            else
              echo "::warning::Missing ${ext} for ${{ matrix.chapter }}"
            fi
          done
          ls -la "_export/chapters/${{ matrix.chapter }}/" || true

      - name: Upload chapter exports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: export-${{ matrix.chapter }}
          path: _export/chapters/${{ matrix.chapter }}
          retention-days: 1
          if-no-files-found: warn

  deploy:
    needs: [build, export]
    if: ${{ always() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download HTML site
        uses: actions/download-artifact@v4
        with:
          name: site-html
          path: _site

      - name: Download chapter exports
        uses: actions/download-artifact@v4
        with:
          pattern: export-*
          merge-multiple: true
          path: _exports

      - name: Merge exports into site
        run: |
          for ch in capitulo1 capitulo2 capitulo3 capitulo4; do
            if [ -f "_exports/export-${ch}/index.docx" ]; then
              cp "_exports/export-${ch}/index.docx" "_site/chapters/${ch}/"
            else
              echo "::warning::Missing DOCX for ${ch}"
            fi
            if [ -f "_exports/export-${ch}/index.pdf" ]; then
              cp "_exports/export-${ch}/index.pdf" "_site/chapters/${ch}/"
            else
              echo "::warning::Missing PDF for ${ch}"
            fi
          done
          echo "Export files in site:"
          ls -la _site/chapters/capitulo*/index.docx _site/chapters/capitulo*/index.pdf 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
