name: Publish Quarto Course

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install PDF and diagram dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin
          quarto install tinytex
          npm install -g @mermaid-js/mermaid-cli

      - name: Render course
        run: quarto render

      - name: Render chapter exports
        run: |
          for ch in chapters/capitulo{1,2,3,4}/index.qmd; do
            quarto render "$ch" --to pdf,docx
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
