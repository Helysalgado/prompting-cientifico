project:
  type: website
  output-dir: _site
  preview:
    port: 4200
    browser: true
  render:
    - "**/*.qmd"
    - "chapters/**/*.md"
    - "!COMPONENTS_REFERENCE.md"
    - "!chapters/capitulo*/files/*.ipynb"
    - "!chapters/example-chapter-*/**"
    - "!templates/**"


resources:
  - capitulo*/files/**/*

metadata:
  version: "0.1.0"

website:
