<svg viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Inter', system-ui, sans-serif">
  <title>Generación autoregresiva: el contexto crece en cada paso</title>
  <desc>Diagrama que muestra cómo el prompt permanece como ancla en cada paso de predicción, y los tokens generados se acumulan formando un contexto creciente.</desc>

  <!-- Background -->
  <rect width="680" height="380" fill="#ffffff" rx="12"/>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a2e">Generación autoregresiva — el prompt siempre está presente</text>

  <!-- Legend -->
  <rect x="30" y="48" width="14" height="14" rx="3" fill="#5E81AC"/>
  <text x="50" y="60" font-size="11" fill="#555">Prompt (ancla — nunca desaparece)</text>
  <rect x="230" y="48" width="14" height="14" rx="3" fill="#A3BE8C"/>
  <text x="250" y="60" font-size="11" fill="#555">Token generado (se acumula)</text>
  <rect x="430" y="48" width="14" height="14" rx="3" fill="#EBCB8B" stroke="#D08770" stroke-width="1.5"/>
  <text x="450" y="60" font-size="11" fill="#555">Siguiente token predicho</text>

  <!-- Row labels -->
  <text x="16" y="112" font-size="10" fill="#888" text-anchor="middle" transform="rotate(-90,16,112)">Paso 1</text>
  <text x="16" y="182" font-size="10" fill="#888" text-anchor="middle" transform="rotate(-90,16,182)">Paso 2</text>
  <text x="16" y="252" font-size="10" fill="#888" text-anchor="middle" transform="rotate(-90,16,252)">Paso 3</text>
  <text x="16" y="322" font-size="10" fill="#888" text-anchor="middle" transform="rotate(-90,16,322)">Paso 4</text>

  <!-- PASO 1 -->
  <rect x="30" y="82" width="220" height="40" rx="6" fill="#5E81AC" opacity="0.18"/>
  <rect x="30" y="82" width="220" height="40" rx="6" fill="none" stroke="#5E81AC" stroke-width="1.8"/>
  <text x="140" y="107" text-anchor="middle" font-size="12" fill="#2E3440" font-weight="500">"El gen malT codifica"</text>
  <line x1="255" y1="102" x2="315" y2="102" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="285" y="96" text-anchor="middle" font-size="10" fill="#888">P(t₁|x)</text>
  <rect x="318" y="82" width="60" height="40" rx="6" fill="#EBCB8B" stroke="#D08770" stroke-width="1.8"/>
  <text x="348" y="107" text-anchor="middle" font-size="13" fill="#2E3440" font-weight="600">"un"</text>

  <!-- PASO 2 -->
  <rect x="30" y="152" width="220" height="40" rx="6" fill="#5E81AC" opacity="0.18"/>
  <rect x="30" y="152" width="220" height="40" rx="6" fill="none" stroke="#5E81AC" stroke-width="1.8"/>
  <text x="140" y="177" text-anchor="middle" font-size="12" fill="#2E3440" font-weight="500">"El gen malT codifica"</text>
  <rect x="255" y="152" width="38" height="40" rx="6" fill="#A3BE8C" opacity="0.3"/>
  <rect x="255" y="152" width="38" height="40" rx="6" fill="none" stroke="#A3BE8C" stroke-width="1.8"/>
  <text x="274" y="177" text-anchor="middle" font-size="12" fill="#2E3440">"un"</text>
  <line x1="297" y1="172" x2="335" y2="172" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="316" y="166" text-anchor="middle" font-size="10" fill="#888">P(t₂|…)</text>
  <rect x="338" y="152" width="88" height="40" rx="6" fill="#EBCB8B" stroke="#D08770" stroke-width="1.8"/>
  <text x="382" y="177" text-anchor="middle" font-size="13" fill="#2E3440" font-weight="600">"regulador"</text>

  <!-- PASO 3 -->
  <rect x="30" y="222" width="220" height="40" rx="6" fill="#5E81AC" opacity="0.18"/>
  <rect x="30" y="222" width="220" height="40" rx="6" fill="none" stroke="#5E81AC" stroke-width="1.8"/>
  <text x="140" y="247" text-anchor="middle" font-size="12" fill="#2E3440" font-weight="500">"El gen malT codifica"</text>
  <rect x="255" y="222" width="38" height="40" rx="6" fill="#A3BE8C" opacity="0.3"/>
  <rect x="255" y="222" width="38" height="40" rx="6" fill="none" stroke="#A3BE8C" stroke-width="1.8"/>
  <text x="274" y="247" text-anchor="middle" font-size="12" fill="#2E3440">"un"</text>
  <rect x="298" y="222" width="88" height="40" rx="6" fill="#A3BE8C" opacity="0.3"/>
  <rect x="298" y="222" width="88" height="40" rx="6" fill="none" stroke="#A3BE8C" stroke-width="1.8"/>
  <text x="342" y="247" text-anchor="middle" font-size="12" fill="#2E3440">"regulador"</text>
  <line x1="390" y1="242" x2="418" y2="242" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="404" y="236" text-anchor="middle" font-size="10" fill="#888">P(t₃|…)</text>
  <rect x="421" y="222" width="52" height="40" rx="6" fill="#EBCB8B" stroke="#D08770" stroke-width="1.8"/>
  <text x="447" y="247" text-anchor="middle" font-size="13" fill="#2E3440" font-weight="600">"que"</text>

  <!-- PASO 4 -->
  <rect x="30" y="292" width="220" height="40" rx="6" fill="#5E81AC" opacity="0.18"/>
  <rect x="30" y="292" width="220" height="40" rx="6" fill="none" stroke="#5E81AC" stroke-width="1.8"/>
  <text x="140" y="317" text-anchor="middle" font-size="12" fill="#2E3440" font-weight="500">"El gen malT codifica"</text>
  <rect x="255" y="292" width="38" height="40" rx="6" fill="#A3BE8C" opacity="0.3"/>
  <rect x="255" y="292" width="38" height="40" rx="6" fill="none" stroke="#A3BE8C" stroke-width="1.8"/>
  <text x="274" y="317" text-anchor="middle" font-size="12" fill="#2E3440">"un"</text>
  <rect x="298" y="292" width="88" height="40" rx="6" fill="#A3BE8C" opacity="0.3"/>
  <rect x="298" y="292" width="88" height="40" rx="6" fill="none" stroke="#A3BE8C" stroke-width="1.8"/>
  <text x="342" y="317" text-anchor="middle" font-size="12" fill="#2E3440">"regulador"</text>
  <rect x="391" y="292" width="52" height="40" rx="6" fill="#A3BE8C" opacity="0.3"/>
  <rect x="391" y="292" width="52" height="40" rx="6" fill="none" stroke="#A3BE8C" stroke-width="1.8"/>
  <text x="417" y="317" text-anchor="middle" font-size="12" fill="#2E3440">"que"</text>
  <line x1="447" y1="312" x2="472" y2="312" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="460" y="306" text-anchor="middle" font-size="10" fill="#888">P(t₄|…)</text>
  <rect x="475" y="292" width="72" height="40" rx="6" fill="#EBCB8B" stroke="#D08770" stroke-width="1.8"/>
  <text x="511" y="317" text-anchor="middle" font-size="13" fill="#2E3440" font-weight="600">"controla"</text>

  <!-- Vertical divider prompt / tokens -->
  <line x1="252" y1="82" x2="252" y2="332" stroke="#5E81AC" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Bottom note -->
  <text x="340" y="365" text-anchor="middle" font-size="11" fill="#888">
    El contexto crece con cada token — pero el prompt permanece como ancla en todos los pasos.
  </text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
  </defs>
</svg>
