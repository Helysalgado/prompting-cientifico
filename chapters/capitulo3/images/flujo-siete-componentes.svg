<svg viewBox="0 0 820 420" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif">
  <title>Flujo de los siete componentes del prompt científico</title>
  <desc>Diagrama que muestra cómo los siete componentes del prompt condicionan progresivamente la generación del modelo y cómo el científico evalúa la salida.</desc>

  <!-- Background -->
  <rect width="820" height="420" fill="#ffffff"/>

  <!-- Section labels -->
  <text x="170" y="22" text-anchor="middle" font-size="11" fill="#888888" font-weight="600" letter-spacing="1">ANTES DE GENERAR</text>
  <text x="480" y="22" text-anchor="middle" font-size="11" fill="#888888" font-weight="600" letter-spacing="1">GENERACIÓN</text>
  <text x="670" y="22" text-anchor="middle" font-size="11" fill="#888888" font-weight="600" letter-spacing="1">DESPUÉS DE GENERAR</text>

  <!-- Divider lines -->
  <line x1="350" y1="30" x2="350" y2="400" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="570" y1="30" x2="570" y2="400" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== LEFT PANEL: 5 conditioning components ===== -->

  <!-- ROLE -->
  <rect x="20" y="42" width="300" height="38" rx="5" fill="#4A7FB5" opacity="0.15"/>
  <rect x="20" y="42" width="5" height="38" rx="2" fill="#4A7FB5"/>
  <text x="36" y="58" font-size="12" font-weight="700" fill="#4A7FB5">ROLE</text>
  <text x="36" y="73" font-size="11" fill="#555555">Activa marco epistemológico</text>

  <line x1="170" y1="80" x2="170" y2="92" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CONTEXTO -->
  <rect x="30" y="92" width="280" height="38" rx="5" fill="#4A7FB5" opacity="0.13"/>
  <rect x="30" y="92" width="5" height="38" rx="2" fill="#4A7FB5"/>
  <text x="46" y="108" font-size="12" font-weight="700" fill="#4A7FB5">CONTEXTO</text>
  <text x="46" y="123" font-size="11" fill="#555555">Acota al dominio experimental</text>

  <line x1="170" y1="130" x2="170" y2="142" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- TAREA -->
  <rect x="45" y="142" width="250" height="38" rx="5" fill="#E07B39" opacity="0.15"/>
  <rect x="45" y="142" width="5" height="38" rx="2" fill="#E07B39"/>
  <text x="61" y="158" font-size="12" font-weight="700" fill="#C05E1A">TAREA</text>
  <text x="61" y="173" font-size="11" fill="#555555">Define la operación cognitiva</text>

  <line x1="170" y1="180" x2="170" y2="192" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ALCANCE -->
  <rect x="60" y="192" width="220" height="38" rx="5" fill="#E07B39" opacity="0.12"/>
  <rect x="60" y="192" width="5" height="38" rx="2" fill="#E07B39"/>
  <text x="76" y="208" font-size="12" font-weight="700" fill="#C05E1A">ALCANCE</text>
  <text x="76" y="223" font-size="11" fill="#555555">Delimita el territorio (positivo)</text>

  <line x1="170" y1="230" x2="170" y2="242" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- RESTRICCIONES -->
  <rect x="78" y="242" width="184" height="38" rx="5" fill="#C0392B" opacity="0.12"/>
  <rect x="78" y="242" width="5" height="38" rx="2" fill="#C0392B"/>
  <text x="94" y="258" font-size="12" font-weight="700" fill="#A93226">RESTRICCIONES</text>
  <text x="94" y="273" font-size="11" fill="#555555">Controla la inferencia (negativo)</text>

  <!-- Funnel arrow to model -->
  <path d="M 262 261 C 310 261 330 261 355 261" stroke="#999999" stroke-width="2" fill="none" marker-end="url(#arr2)"/>

  <!-- Funnel label -->
  <text x="170" y="310" text-anchor="middle" font-size="10" fill="#999999">Cada componente</text>
  <text x="170" y="323" text-anchor="middle" font-size="10" fill="#999999">estrecha P(y|x)</text>
  <polygon points="60,338 280,338 210,365 130,365" fill="none" stroke="#cccccc" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- ===== CENTER PANEL: LLM ===== -->
  <rect x="360" y="200" width="195" height="110" rx="10" fill="#ffffff" stroke="#5B4A8A" stroke-width="2"/>
  <text x="457" y="228" text-anchor="middle" font-size="13" font-weight="700" fill="#5B4A8A">Modelo LLM</text>
  <text x="457" y="248" text-anchor="middle" font-size="13" fill="#5B4A8A">P(y | x)</text>
  <text x="457" y="270" text-anchor="middle" font-size="10" fill="#888888">genera lo estadísticamente</text>
  <text x="457" y="283" text-anchor="middle" font-size="10" fill="#888888">plausible dado el prompt</text>

  <!-- Arrow from model to right -->
  <path d="M 555 255 C 565 255 570 255 580 255" stroke="#999999" stroke-width="2" fill="none" marker-end="url(#arr2)"/>

  <!-- ===== RIGHT PANEL: SALIDA + VERIFICACIÓN ===== -->

  <!-- SALIDA ESPERADA -->
  <rect x="585" y="160" width="215" height="60" rx="5" fill="#27AE60" opacity="0.13"/>
  <rect x="585" y="160" width="5" height="60" rx="2" fill="#27AE60"/>
  <text x="601" y="183" font-size="12" font-weight="700" fill="#1E8449">SALIDA ESPERADA</text>
  <text x="601" y="199" font-size="11" fill="#555555">Estructura el output</text>
  <text x="601" y="213" font-size="11" fill="#555555">(separa datos / inf. / límites)</text>

  <line x1="693" y1="220" x2="693" y2="238" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- VERIFICACIÓN -->
  <rect x="585" y="240" width="215" height="60" rx="5" fill="#148F77" opacity="0.12"/>
  <rect x="585" y="240" width="5" height="38" rx="2" fill="#148F77"/>
  <text x="601" y="263" font-size="12" font-weight="700" fill="#0E6655">VERIFICACIÓN</text>
  <text x="601" y="279" font-size="11" fill="#555555">Criterios del evaluador humano</text>
  <text x="601" y="293" font-size="11" fill="#555555">(contrasta, juzga, refuta)</text>

  <line x1="693" y1="302" x2="693" y2="318" stroke="#aaaaaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="693" y="338" text-anchor="middle" font-size="22">🔬</text>
  <text x="693" y="358" text-anchor="middle" font-size="10" fill="#888888">el científico decide</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#aaaaaa"/>
    </marker>
    <marker id="arr2" markerWidth="7" markerHeight="7" refX="3" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#999999"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="20" y="385" width="12" height="12" rx="2" fill="#4A7FB5" opacity="0.6"/>
  <text x="36" y="396" font-size="10" fill="#666666">Marco y datos</text>
  <rect x="130" y="385" width="12" height="12" rx="2" fill="#E07B39" opacity="0.6"/>
  <text x="146" y="396" font-size="10" fill="#666666">Operación y territorio</text>
  <rect x="275" y="385" width="12" height="12" rx="2" fill="#C0392B" opacity="0.6"/>
  <text x="291" y="396" font-size="10" fill="#666666">Control</text>
  <rect x="355" y="385" width="12" height="12" rx="2" fill="#5B4A8A" opacity="0.6"/>
  <text x="371" y="396" font-size="10" fill="#666666">Generación</text>
  <rect x="460" y="385" width="12" height="12" rx="2" fill="#27AE60" opacity="0.6"/>
  <text x="476" y="396" font-size="10" fill="#666666">Output + evaluación</text>
</svg>
