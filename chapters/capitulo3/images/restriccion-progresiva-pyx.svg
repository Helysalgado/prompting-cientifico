<svg viewBox="0 0 820 455" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif">
  <title>Restricción progresiva de P(y|x) — los siete componentes como filtros</title>
  <desc>Diagrama de embudo que muestra cómo cada componente del prompt reduce progresivamente el espacio de generación del modelo antes de que genere, y cómo SALIDA ESPERADA y VERIFICACIÓN actúan después.</desc>

  <rect width="820" height="455" fill="#ffffff"/>

  <!-- ===== TIMELINE ===== -->
  <rect x="40" y="16" width="418" height="30" rx="6" fill="#EBF3FB" stroke="#4A7FB5" stroke-width="1.5"/>
  <text x="249" y="36" text-anchor="middle" font-size="11" font-weight="700" fill="#4A7FB5" letter-spacing="0.5">ANTES DE GENERAR</text>

  <rect x="463" y="16" width="84" height="30" rx="6" fill="#F0ECF8" stroke="#5B4A8A" stroke-width="1.5"/>
  <text x="505" y="36" text-anchor="middle" font-size="9.5" font-weight="700" fill="#5B4A8A">GENERACIÓN</text>

  <rect x="552" y="16" width="230" height="30" rx="6" fill="#EAFAF1" stroke="#27AE60" stroke-width="1.5"/>
  <text x="667" y="36" text-anchor="middle" font-size="11" font-weight="700" fill="#27AE60" letter-spacing="0.5">DESPUÉS DE GENERAR</text>

  <!-- ===== COMPONENT LABEL BOXES ===== -->
  <rect x="40"  y="52" width="84" height="22" rx="4" fill="#4A7FB5"/>
  <text x="82"  y="67" text-anchor="middle" font-size="10" font-weight="700" fill="white">ROLE</text>
  <line x1="82"  y1="74" x2="82"  y2="85" stroke="#4A7FB5" stroke-width="1.2"/>

  <rect x="124" y="52" width="84" height="22" rx="4" fill="#5B9CD4"/>
  <text x="166" y="67" text-anchor="middle" font-size="10" font-weight="700" fill="white">CONTEXTO</text>
  <line x1="166" y1="74" x2="166" y2="85" stroke="#5B9CD4" stroke-width="1.2"/>

  <rect x="208" y="52" width="84" height="22" rx="4" fill="#E07B39"/>
  <text x="250" y="67" text-anchor="middle" font-size="10" font-weight="700" fill="white">TAREA</text>
  <line x1="250" y1="74" x2="250" y2="85" stroke="#E07B39" stroke-width="1.2"/>

  <rect x="292" y="52" width="80" height="22" rx="4" fill="#E8A86A"/>
  <text x="332" y="67" text-anchor="middle" font-size="10" font-weight="700" fill="white">ALCANCE</text>
  <line x1="332" y1="74" x2="332" y2="85" stroke="#E8A86A" stroke-width="1.2"/>

  <rect x="372" y="52" width="86" height="22" rx="4" fill="#C0392B"/>
  <text x="415" y="67" text-anchor="middle" font-size="9" font-weight="700" fill="white">RESTRICCIONES</text>
  <line x1="415" y1="74" x2="415" y2="85" stroke="#C0392B" stroke-width="1.2"/>

  <!-- ===== FUNNEL BACKGROUND (full probability space) ===== -->
  <rect x="40" y="85" width="418" height="248" fill="#F2F2F2" rx="2"/>

  <!-- ===== WHITE INTERIOR (remaining probability space) ===== -->
  <!--
    x=40  → y_top=85,  y_bot=333
    x=124 → y_top=99,  y_bot=319  (ROLE: 14px each side)
    x=208 → y_top=113, y_bot=305  (CONTEXTO: 14px)
    x=292 → y_top=127, y_bot=291  (TAREA: 14px)
    x=372 → y_top=140, y_bot=278  (ALCANCE: 13px)
    x=458 → y_top=152, y_bot=266  (RESTRICCIONES: 12px)
  -->
  <polygon
    points="40,85 124,99 208,113 292,127 372,140 458,152
            458,266 372,278 292,291 208,305 124,319 40,333"
    fill="#FFFFFF" stroke="#CCCCCC" stroke-width="1"/>

  <!-- ===== EXCLUSION ZONES — TOP (colored bands) ===== -->
  <polygon points="40,85  124,85  124,99  40,85"   fill="#4A7FB5" opacity="0.38"/>
  <polygon points="124,85 208,85 208,113 124,99"   fill="#5B9CD4" opacity="0.38"/>
  <polygon points="208,85 292,85 292,127 208,113"  fill="#E07B39" opacity="0.38"/>
  <polygon points="292,85 372,85 372,140 292,127"  fill="#E8A86A" opacity="0.38"/>
  <polygon points="372,85 458,85 458,152 372,140"  fill="#C0392B" opacity="0.45"/>

  <!-- ===== EXCLUSION ZONES — BOTTOM (mirror) ===== -->
  <polygon points="40,333  124,333  124,319  40,333"  fill="#4A7FB5" opacity="0.38"/>
  <polygon points="124,333 208,333 208,305 124,319"   fill="#5B9CD4" opacity="0.38"/>
  <polygon points="208,333 292,333 292,291 208,305"   fill="#E07B39" opacity="0.38"/>
  <polygon points="292,333 372,333 372,278 292,291"   fill="#E8A86A" opacity="0.38"/>
  <polygon points="372,333 458,333 458,266 372,278"   fill="#C0392B" opacity="0.45"/>

  <!-- ===== SECTION DIVIDERS ===== -->
  <line x1="124" y1="85" x2="124" y2="333" stroke="#cccccc" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="208" y1="85" x2="208" y2="333" stroke="#cccccc" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="292" y1="85" x2="292" y2="333" stroke="#cccccc" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="372" y1="85" x2="372" y2="333" stroke="#cccccc" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- ===== FUNCTION LABELS inside exclusion zones ===== -->
  <text x="250" y="103" text-anchor="middle" font-size="7.5" fill="#9a4a10" opacity="0.9">verbo</text>
  <text x="250" y="113" text-anchor="middle" font-size="7.5" fill="#9a4a10" opacity="0.9">cognitivo</text>
  <text x="332" y="106" text-anchor="middle" font-size="7.5" fill="#8a5000" opacity="0.9">territorio</text>
  <text x="332" y="116" text-anchor="middle" font-size="7.5" fill="#8a5000" opacity="0.9">del análisis</text>
  <text x="415" y="108" text-anchor="middle" font-size="7.5" fill="#7b1e12" opacity="0.9">afirmaciones</text>
  <text x="415" y="118" text-anchor="middle" font-size="7.5" fill="#7b1e12" opacity="0.9">no permitidas</text>
  <text x="250" y="307" text-anchor="middle" font-size="7.5" fill="#9a4a10" opacity="0.9">nivel inferencia</text>
  <text x="332" y="300" text-anchor="middle" font-size="7.5" fill="#8a5000" opacity="0.9">qué incluir</text>
  <text x="415" y="296" text-anchor="middle" font-size="7.5" fill="#7b1e12" opacity="0.9">qué no afirmar</text>

  <!-- ===== P(y|x) LABELS inside interior ===== -->
  <text x="60"  y="204" font-size="8.5" fill="#aaaaaa" font-style="italic">P(y|x)</text>
  <text x="60"  y="216" font-size="8.5" fill="#aaaaaa" font-style="italic">abierto</text>
  <text x="390" y="204" text-anchor="middle" font-size="8" fill="#bbbbbb" font-style="italic">espacio</text>
  <text x="390" y="215" text-anchor="middle" font-size="8" fill="#bbbbbb" font-style="italic">condicionado</text>

  <!-- ===== LLM BOX ===== -->
  <rect x="458" y="152" width="87" height="114" rx="8" fill="white" stroke="#5B4A8A" stroke-width="2"/>
  <text x="501" y="192" text-anchor="middle" font-size="11.5" font-weight="700" fill="#5B4A8A">LLM</text>
  <text x="501" y="215" text-anchor="middle" font-size="13"   fill="#5B4A8A">P(y|x)</text>
  <text x="501" y="238" text-anchor="middle" font-size="8.5"  fill="#9d8cc4">genera lo</text>
  <text x="501" y="250" text-anchor="middle" font-size="8.5"  fill="#9d8cc4">condicionado</text>

  <!-- Arrow LLM → output -->
  <line x1="545" y1="209" x2="557" y2="209" stroke="#888" stroke-width="1.5" marker-end="url(#arrGray)"/>

  <!-- ===== SALIDA ESPERADA ===== -->
  <rect x="558" y="145" width="115" height="128" rx="7" fill="#EAFAF1" stroke="#27AE60" stroke-width="1.5"/>
  <rect x="558" y="145" width="115" height="20" rx="7" fill="#27AE60"/>
  <rect x="558" y="155" width="115" height="10" fill="#27AE60"/>
  <text x="615" y="160" text-anchor="middle" font-size="9" font-weight="700" fill="white">SALIDA ESPERADA</text>
  <text x="615" y="178" text-anchor="middle" font-size="8.5" fill="#1a7a40">Estructura el output</text>
  <text x="615" y="192" text-anchor="middle" font-size="8.5" fill="#1a7a40">para evaluación</text>
  <line x1="568" y1="202" x2="663" y2="202" stroke="#b2dfdb" stroke-width="0.8"/>
  <text x="615" y="215" text-anchor="middle" font-size="8" fill="#4caf90">— separa datos</text>
  <text x="615" y="228" text-anchor="middle" font-size="8" fill="#4caf90">— separa inferencias</text>
  <text x="615" y="241" text-anchor="middle" font-size="8" fill="#4caf90">— declara límites</text>
  <text x="615" y="264" text-anchor="middle" font-size="7.5" fill="#888" font-style="italic">Al estructurar</text>

  <!-- Arrow SALIDA → VERIFICACIÓN -->
  <line x1="673" y1="209" x2="685" y2="209" stroke="#27AE60" stroke-width="1.5" marker-end="url(#arrGreen)"/>

  <!-- ===== VERIFICACIÓN ===== -->
  <rect x="686" y="145" width="110" height="128" rx="7" fill="#E8F8F5" stroke="#148F77" stroke-width="1.5"/>
  <rect x="686" y="145" width="110" height="20" rx="7" fill="#148F77"/>
  <rect x="686" y="155" width="110" height="10" fill="#148F77"/>
  <text x="741" y="160" text-anchor="middle" font-size="9" font-weight="700" fill="white">VERIFICACIÓN</text>
  <text x="741" y="178" text-anchor="middle" font-size="8.5" fill="#0e6655">Criterios del</text>
  <text x="741" y="192" text-anchor="middle" font-size="8.5" fill="#0e6655">evaluador humano</text>
  <line x1="696" y1="202" x2="786" y2="202" stroke="#b2dfdb" stroke-width="0.8"/>
  <text x="741" y="215" text-anchor="middle" font-size="8" fill="#4caf90">— contrasta</text>
  <text x="741" y="228" text-anchor="middle" font-size="8" fill="#4caf90">— juzga</text>
  <text x="741" y="241" text-anchor="middle" font-size="8" fill="#4caf90">— refuta</text>
  <text x="741" y="264" text-anchor="middle" font-size="7.5" fill="#888" font-style="italic">Después de generar</text>

  <!-- Scientist -->
  <text x="741" y="302" text-anchor="middle" font-size="22">🔬</text>
  <text x="741" y="322" text-anchor="middle" font-size="8.5" fill="#888">el científico</text>
  <text x="741" y="333" text-anchor="middle" font-size="8.5" fill="#888">decide</text>

  <!-- ===== BOTTOM ANNOTATION ===== -->
  <path d="M40,347 L40,360 L458,360 L458,347" fill="none" stroke="#4A7FB5" stroke-width="0.8" opacity="0.5"/>
  <text x="249" y="374" text-anchor="middle" font-size="9" fill="#4A7FB5">Cada componente estrecha P(y|x) — el modelo genera dentro del espacio restante</text>

  <!-- ===== ARROW MARKERS ===== -->
  <defs>
    <marker id="arrGray" markerWidth="7" markerHeight="7" refX="4" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#888888"/>
    </marker>
    <marker id="arrGreen" markerWidth="7" markerHeight="7" refX="4" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#27AE60"/>
    </marker>
  </defs>

  <!-- ===== LEGEND ===== -->
  <rect x="40"  y="388" width="10" height="10" rx="2" fill="#4A7FB5" opacity="0.6"/>
  <text x="54"  y="397" font-size="8.5" fill="#666">Marco / datos</text>
  <rect x="145" y="388" width="10" height="10" rx="2" fill="#E07B39" opacity="0.6"/>
  <text x="159" y="397" font-size="8.5" fill="#666">Operación / territorio</text>
  <rect x="300" y="388" width="10" height="10" rx="2" fill="#C0392B" opacity="0.6"/>
  <text x="314" y="397" font-size="8.5" fill="#666">Control</text>
  <rect x="375" y="388" width="10" height="10" rx="2" fill="#5B4A8A" opacity="0.6"/>
  <text x="389" y="397" font-size="8.5" fill="#666">Generación</text>
  <rect x="462" y="388" width="10" height="10" rx="2" fill="#27AE60" opacity="0.6"/>
  <text x="476" y="397" font-size="8.5" fill="#666">Output / evaluación</text>
  <rect x="600" y="388" width="10" height="10" rx="2" fill="#F2F2F2" stroke="#ccc" stroke-width="1"/>
  <text x="614" y="397" font-size="8.5" fill="#666">Espacio excluido de P(y|x)</text>

  <!-- ===== BOTTOM NOTE ===== -->
  <text x="40" y="418" font-size="8" fill="#aaaaaa" font-style="italic">Las zonas coloreadas muestran lo que cada componente elimina del espacio de generación. La zona blanca es lo que el modelo puede generar.</text>
</svg>
